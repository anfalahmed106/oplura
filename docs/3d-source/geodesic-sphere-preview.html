<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
  #stage { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="stage"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  // ---------- Truncated icosahedron (soccer-ball topology) ----------
  // 60 nodes, 90 rods, every node degree-3 -> clean, spaced-out, no clutter.
  function normalize(v) {
    const len = Math.hypot(v[0], v[1], v[2]);
    return [v[0] / len, v[1] / len, v[2] / len];
  }
  function lerp(a, b, t) {
    return [a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t, a[2] + (b[2]-a[2])*t];
  }
  function addEdge(map, a, b) {
    const key = a < b ? a + '_' + b : b + '_' + a;
    if (!map.has(key)) map.set(key, [a, b]);
  }

  function buildTruncatedIcosahedron(radius) {
    const t = (1 + Math.sqrt(5)) / 2;
    const rawVerts = [
      [-1, t, 0], [1, t, 0], [-1, -t, 0], [1, -t, 0],
      [0, -1, t], [0, 1, t], [0, -1, -t], [0, 1, -t],
      [t, 0, -1], [t, 0, 1], [-t, 0, -1], [-t, 0, 1],
    ].map(normalize);

    const faces = [
      [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
      [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
      [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
      [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1],
    ];

    const nodePositions = [];
    const edgeData = new Map();

    function ensureEdge(a, b) {
      const key = a < b ? a + '_' + b : b + '_' + a;
      if (edgeData.has(key)) return edgeData.get(key);
      const u = Math.min(a, b), v = Math.max(a, b);
      const pu = normalize(lerp(rawVerts[u], rawVerts[v], 1/3));
      const pv = normalize(lerp(rawVerts[u], rawVerts[v], 2/3));
      nodePositions.push(pu.map((c) => c * radius));
      const nearU = nodePositions.length - 1;
      nodePositions.push(pv.map((c) => c * radius));
      const nearV = nodePositions.length - 1;
      const data = { u, v, nearU, nearV };
      edgeData.set(key, data);
      return data;
    }

    function nearPointOf(vertex, other) {
      const d = ensureEdge(vertex, other);
      return vertex === d.u ? d.nearU : d.nearV;
    }

    const edgeSet = new Map();

    // hex-hex edges: one per original icosahedron edge (30 total)
    for (const [a, b, c] of faces) {
      [[a, b], [b, c], [c, a]].forEach(([x, y]) => {
        const d = ensureEdge(x, y);
        addEdge(edgeSet, d.nearU, d.nearV);
      });
    }

    // pentagon edges: 5-cycle around each original vertex (60 total)
    const vertexFacePairs = new Map();
    for (const f of faces) {
      for (let i = 0; i < 3; i++) {
        const v = f[i], b = f[(i + 1) % 3], c = f[(i + 2) % 3];
        if (!vertexFacePairs.has(v)) vertexFacePairs.set(v, []);
        vertexFacePairs.get(v).push([b, c]);
      }
    }
    for (let v = 0; v < rawVerts.length; v++) {
      const pairs = vertexFacePairs.get(v);
      const nextMap = new Map();
      pairs.forEach(([b, c]) => nextMap.set(b, c));
      const start = pairs[0][0];
      const ring = [start];
      let current = start;
      for (let i = 1; i < pairs.length; i++) {
        current = nextMap.get(current);
        ring.push(current);
      }
      const penta = ring.map((n) => nearPointOf(v, n));
      for (let i = 0; i < penta.length; i++) {
        addEdge(edgeSet, penta[i], penta[(i + 1) % penta.length]);
      }
    }

    return { nodePositions, edges: Array.from(edgeSet.values()) };
  }

  // ---------- Scene setup ----------
  const container = document.getElementById('stage');
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 100);
  camera.position.set(0, 0.5, 7.5);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setClearColor(0x000000, 0);
  container.appendChild(renderer.domElement);

  const group = new THREE.Group();
  scene.add(group);

  const RADIUS = 2;
  const { nodePositions, edges } = buildTruncatedIcosahedron(RADIUS);
  const nodeRadius = RADIUS * 0.075;
  const rodRadius = RADIUS * 0.032;

  // ---------- Palette: Oplura enterprise â€” satin Matte Graphite body, Enterprise Blue + Ice Cyan accents ----------
  const baseColor = 0x1F2937; // Matte Graphite â€” main body

  const nodeMaterial = new THREE.MeshPhysicalMaterial({
    color: baseColor, metalness: 0.7, roughness: 0.35, clearcoat: 0.18, clearcoatRoughness: 0.4,
  });
  const rodMaterial = new THREE.MeshPhysicalMaterial({
    color: baseColor, metalness: 0.65, roughness: 0.42, clearcoat: 0.12, clearcoatRoughness: 0.5,
    flatShading: true,
  });

  const dummy = new THREE.Object3D();

  const nodeGeo = new THREE.SphereGeometry(nodeRadius, 24, 24);
  const nodeMesh = new THREE.InstancedMesh(nodeGeo, nodeMaterial, nodePositions.length);
  nodePositions.forEach((p, i) => {
    dummy.position.set(p[0], p[1], p[2]);
    dummy.updateMatrix();
    nodeMesh.setMatrixAt(i, dummy.matrix);
  });
  group.add(nodeMesh);

  const rodGeo = new THREE.CylinderGeometry(rodRadius, rodRadius, 1, 4, 1);
  const rodMesh = new THREE.InstancedMesh(rodGeo, rodMaterial, edges.length);
  const up = new THREE.Vector3(0, 1, 0);
  const start = new THREE.Vector3(), end = new THREE.Vector3(), mid = new THREE.Vector3(), dir = new THREE.Vector3();
  edges.forEach(([a, b], i) => {
    start.set(nodePositions[a][0], nodePositions[a][1], nodePositions[a][2]);
    end.set(nodePositions[b][0], nodePositions[b][1], nodePositions[b][2]);
    mid.copy(start).add(end).multiplyScalar(0.5);
    dir.copy(end).sub(start);
    const length = dir.length();
    dir.normalize();
    dummy.position.copy(mid);
    dummy.quaternion.setFromUnitVectors(up, dir);
    dummy.scale.set(1, length, 1);
    dummy.updateMatrix();
    rodMesh.setMatrixAt(i, dummy.matrix);
  });
  group.add(rodMesh);

  // ---------- Lighting: soft studio light, satin graphite body, subtle blue/cyan glow only ----------
  scene.add(new THREE.AmbientLight(0xffffff, 0.35)); // soft overall fill

  const keyLight = new THREE.PointLight(0xffffff, 5, 22, 1.6);
  keyLight.position.set(4.5, 2.5, 4);
  scene.add(keyLight);

  const blueKey = new THREE.PointLight(0x2563eb, 5, 19, 1.6); // Enterprise Blue â€” connection-line accent
  blueKey.position.set(5, 3.5, 3);
  scene.add(blueKey);

  const cyanAccent = new THREE.PointLight(0x38bdf8, 2.5, 17, 1.6); // Ice Cyan â€” small highlight only
  cyanAccent.position.set(3.5, -1.5, 4.5);
  scene.add(cyanAccent);

  // Soft white fill for a gentle specular sheen across the right side
  const rightFill = new THREE.PointLight(0xf8fafc, 3, 24, 1.4);
  rightFill.position.set(7.5, 0.5, 1.5);
  scene.add(rightFill);

  const rimWhisper = new THREE.PointLight(0x0f172a, 1.5, 16, 2); // dark rim, matches dark-section bg
  rimWhisper.position.set(-5, -2, -4);
  scene.add(rimWhisper);

  // ---------- Animation: slow linear single-axis rotation, no easing, no float ----------
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    group.rotation.y += delta * (Math.PI * 2 / 24); // 360Â° / 24s
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    const w = container.clientWidth, h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });
})();
</script>
</body>
</html>
